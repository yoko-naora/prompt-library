<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MrLarus Prompt Library</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FAF7F2;
  --ink: #1C1C2E;
  --muted: #6B6B7B;
  --accent: #C7512E;
  --border: #E8E4E0;
  --card: #FFFFFF;
  --hover: #F5F0EA;
  --radius: 8px;
  --sidebar-w: 220px;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Noto Sans SC', 'Noto Sans JP', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--ink);
  display: flex;
  min-height: 100vh;
  line-height: 1.6;
}
/* ===== SIDEBAR ===== */
.sidebar {
  width: var(--sidebar-w);
  background: #fff;
  border-right: 1px solid var(--border);
  padding: 32px 24px;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  overflow-y: auto;
  z-index: 10;
  display: flex;
  flex-direction: column;
}
.sidebar-logo {
  font-size: 20px; font-weight: 900; color: var(--ink);
  letter-spacing: -0.01em; margin-bottom: 4px;
}
.sidebar-logo span { color: var(--accent); }
.sidebar-sub {
  font-size: 12px; color: var(--muted); margin-bottom: 32px;
  letter-spacing: 0.05em;
}
.sidebar-nav { list-style: none; flex: 1; }
.sidebar-nav li { margin-bottom: 2px; }
.sidebar-nav a {
  display: block; padding: 8px 12px; border-radius: 6px;
  font-size: 13px; font-weight: 500; color: var(--muted);
  text-decoration: none; transition: all 0.15s;
  cursor: pointer;
}
.sidebar-nav a:hover { background: var(--hover); color: var(--ink); }
.sidebar-nav a.active { background: var(--ink); color: #fff; font-weight: 700; }
.sidebar-nav a .count { float: right; font-size: 11px; opacity: 0.5; font-weight: 400; }
.sidebar-footer {
  margin-top: 24px; padding-top: 16px;
  border-top: 1px solid var(--border);
  font-size: 11px; color: var(--muted);
}
.sidebar-toggle { display: none; }
/* ===== MAIN ===== */
.main {
  flex: 1; margin-left: var(--sidebar-w);
  padding: 32px 40px;
  min-height: 100vh;
}
/* Search */
.search-bar {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 32px;
}
.search-input {
  flex: 1; padding: 12px 20px; border: 1px solid var(--border);
  border-radius: var(--radius); font-size: 16px;
  font-family: inherit; background: #fff; color: var(--ink);
  outline: none; transition: border 0.2s;
}
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: #C0BDB8; }
.result-count { font-size: 13px; color: var(--muted); white-space: nowrap; }
.lang-switch {
  padding: 10px 16px; border: 1px solid var(--border);
  border-radius: var(--radius); font-size: 13px; font-weight: 700;
  background: #fff; color: var(--ink); cursor: pointer;
  font-family: inherit; transition: all 0.15s;
  white-space: nowrap;
}
.lang-switch:hover { border-color: var(--ink); }
.lang-label-active { color: var(--accent); font-weight: 900; }
.lang-divider { color: var(--muted); margin: 0 2px; }
/* Tags */
.active-cat-tag {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 16px; background: var(--ink); color: #fff;
  border-radius: 20px; font-size: 13px; font-weight: 700;
  margin-bottom: 24px;
}
.active-cat-tag .clear { cursor: pointer; opacity: 0.6; font-size: 16px; line-height: 1; }
.active-cat-tag .clear:hover { opacity: 1; }
/* Cards */
.cards-grid {
  display: flex; flex-direction: column; gap: 20px;
}
.card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px 24px;
  transition: all 0.2s; display: flex; flex-direction: column;
  cursor: default;
}
.card:hover { border-color: #d0cbc4; box-shadow: 0 2px 12px rgba(0,0,0,0.04); }
/* ===== CARD ROWS ===== */
.card-row { padding: 8px 0; }
.card-row + .card-row { border-top: 1px solid var(--border); }
.card-row-header {
  display: flex; align-items: flex-start; gap: 10px;
}
.card-title {
  font-size: 15px; font-weight: 700; color: var(--ink);
  line-height: 1.4; flex: 1;
}
.card-date {
  font-size: 11px; color: var(--muted); white-space: nowrap; flex-shrink: 0;
}
.card-link-inline {
  font-size: 11px; color: var(--accent); font-weight: 500;
  text-decoration: none; white-space: nowrap; flex-shrink: 0;
}
.card-link-inline:hover { text-decoration: underline; }
.prompt-row {
  display: flex; gap: 8px; align-items: flex-start;
}
.prompt-row .row-label {
  font-size: 10px; font-weight: 800; color: var(--accent);
  white-space: nowrap; flex-shrink: 0; padding-top: 1px;
  min-width: 52px; text-align: right;
}
.card.type-video .prompt-row .row-label { color: #1E3A5F; }
.prompt-row .row-content {
  font-size: 13px; color: var(--muted); line-height: 1.55; flex: 1;
  white-space: pre-wrap;
}
.card:not(.expanded) .media-row { display: none; }
.prompt-row .copy-btn-mini {
  flex-shrink: 0; padding: 2px 8px; border: 1px solid var(--border);
  border-radius: 3px; font-size: 10px; font-weight: 700;
  background: #fff; color: var(--muted); cursor: pointer;
  font-family: inherit; transition: all 0.15s;
  white-space: nowrap; margin-top: 1px;
}
.prompt-row .copy-btn-mini:hover { border-color: var(--accent); color: var(--accent); }
.prompt-row .copy-btn-mini.copied { background: var(--ink); color: #fff; border-color: var(--ink); }
.media-row { padding: 8px 0; }
.media-row .row-label {
  font-size: 10px; font-weight: 800; color: var(--muted);
  margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.03em;
}
.expand-hint {
  display: block; width: 100%; text-align: center; padding: 6px 0 2px;
  font-size: 11px; color: #bbb; cursor: pointer;
  font-weight: 500; background: none; border: none;
  font-family: inherit;
}
.expand-hint:hover { color: var(--muted); }
/* Empty state */
.empty-state {
  text-align: center; padding: 80px 20px; color: var(--muted);
}
.empty-state .icon { font-size: 48px; margin-bottom: 16px; }
.empty-state h3 { font-size: 18px; font-weight: 700; color: var(--ink); margin-bottom: 8px; }
/* ===== MOBILE ===== */
@media (max-width: 768px) {
  body { flex-direction: column; }
  .sidebar {
    position: fixed; left: -100%; transition: left 0.3s;
    width: 280px; box-shadow: 4px 0 20px rgba(0,0,0,0.15);
  }
  .sidebar.open { left: 0; }
  .sidebar-toggle {
    display: flex; position: fixed; bottom: 24px; right: 24px;
    width: 48px; height: 48px; border-radius: 50%;
    background: var(--ink); color: #fff; border: none;
    font-size: 20px; align-items: center; justify-content: center;
    cursor: pointer; z-index: 20; box-shadow: 0 4px 16px rgba(0,0,0,0.25);
  }
  .main { margin-left: 0; padding: 20px 16px; }
  .cards-grid { grid-template-columns: 1fr; }
  .search-bar { flex-wrap: wrap; }
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 9; }
  .overlay.show { display: block; }
}
/* ===== SCROLLBAR ===== */
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
/* ===== TYPE FILTER TABS ===== */
.type-tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
.type-tab {
  padding: 7px 18px; border-radius: 20px; font-size: 13px; font-weight: 700;
  border: 1px solid var(--border); background: #fff; cursor: pointer;
  font-family: inherit; transition: all 0.15s; color: var(--muted);
}
.type-tab:hover { border-color: var(--ink); color: var(--ink); }
.type-tab.active.all { background: var(--ink); color: #fff; border-color: var(--ink); }
.type-tab.active.image { background: var(--accent); color: #fff; border-color: var(--accent); }
.type-tab.active.video { background: #1E3A5F; color: #fff; border-color: #1E3A5F; }
.type-tab .count { font-weight: 400; opacity: 0.7; margin-left: 4px; font-size: 11px; }
/* ===== CARD TYPE ACCENTS ===== */
.card.type-image { border-left: 3px solid var(--accent); }
.card.type-video { border-left: 3px solid #1E3A5F; }
.type-badge {
  display: inline-block; padding: 2px 8px; border-radius: 4px;
  font-size: 10px; font-weight: 700; letter-spacing: 0.03em;
  vertical-align: middle; flex-shrink: 0;
}
.type-badge.image { background: #fde8e4; color: var(--accent); }
.type-badge.video { background: #dce8f5; color: #1E3A5F; }
.card-num {
  font-size: 10px; color: #bbb; font-weight: 700;
  background: #f5f5f5; padding: 2px 6px; border-radius: 3px;
  flex-shrink: 0;
}
/* ===== CARD MEDIA ===== */
.media-grid {
  display: flex; flex-direction: column; gap: 12px;
}
.media-grid img {
  width: 100%; height: auto; max-width: 100%;
  border-radius: 4px; cursor: pointer; transition: opacity 0.15s;
}
.media-grid img:hover { opacity: 0.85; }
.card-media video {
  width: 480px; max-width: 100%; border-radius: 4px;
  background: #000; outline: none;
}
/* ===== LIGHTBOX ===== */
.lightbox {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
  z-index: 1000; align-items: center; justify-content: center;
}
.lightbox.show { display: flex; }
.lightbox img { max-width: 92vw; max-height: 92vh; border-radius: 4px; }
.lightbox .close {
  position: absolute; top: 20px; right: 28px;
  font-size: 36px; color: #fff; cursor: pointer;
  background: none; border: none; line-height: 1;
}
/* ===== FONTS PER LANG ===== */
.lang-ja { font-family: 'Noto Sans JP', -apple-system, sans-serif; }
.lang-zh { font-family: 'Noto Sans SC', -apple-system, sans-serif; }
</style>

    collapse: '收起',
    viewOnX: '在 X 查看',
    noResults: '没有找到匹配的提示词',
    noResultsHint: '试试换个关键词',
    all: '全部',
  }
};

function catName(cat) {
  if (currentLang === 'ja' && CAT_JA[cat]) return CAT_JA[cat];
  return cat;
}

// Build category list
function buildCats() {
  const cats = ['all'];
  const catSet = new Set();
  PROMPTS.forEach(p => {
    if (!catSet.has(p.cat)) { catSet.add(p.cat); cats.push(p.cat); }
  });
  return cats;
}
const CATEGORIES = buildCats();

// ===== INIT =====
function buildNav() {
  const nav = document.getElementById('nav');
  nav.innerHTML = '';
  // All
  const liAll = document.createElement('li');
  const aAll = document.createElement('a');
  aAll.setAttribute('data-cat', 'all');
  aAll.onclick = () => filterByCat('all');
  aAll.innerHTML = `${catName('all')} <span class="count">${PROMPTS.length}</span>`;
  if (currentCat === 'all') aAll.classList.add('active');
  liAll.appendChild(aAll);
  nav.appendChild(liAll);
  // Categories
  CATEGORIES.forEach(cat => {
    if (cat === 'all') return;
    const count = PROMPTS.filter(p => p.cat === cat).length;
    const li = document.createElement('li');
    const a = document.createElement('a');
    a.setAttribute('data-cat', cat);
    a.onclick = () => filterByCat(cat);
    a.innerHTML = `${catName(cat)} <span class="count">${count}</span>`;
    if (currentCat === cat) a.classList.add('active');
    li.appendChild(a);
    nav.appendChild(li);
  });
}
function init() { buildNav(); updateTypeTabs(); render(); }

// ===== FILTER & RENDER =====
function filterByCat(cat) {
  currentCat = cat;
  currentType = 'all';
  document.querySelectorAll('.sidebar-nav a').forEach(a => a.classList.remove('active'));
  const target = document.querySelector(`.sidebar-nav a[data-cat="${cat}"]`);
  if (target) target.classList.add('active');
  document.getElementById('searchInput').value = '';
  updateActiveTag();
  updateTypeTabs();
  closeSidebar();
  render();
}

function filterByType(type) {
  currentType = type;
  updateTypeTabs();
  render();
}

function updateTypeTabs() {
  const total = PROMPTS.length;
  const imageCount = PROMPTS.filter(p => p.type === 'image').length;
  const videoCount = PROMPTS.filter(p => p.type === 'video').length;
  document.getElementById('count-all-type').textContent = total;
  document.getElementById('count-image').textContent = imageCount;
  document.getElementById('count-video').textContent = videoCount;
  document.querySelectorAll('.type-tab').forEach(tab => tab.classList.remove('active'));
  const activeTab = document.querySelector(`.type-tab.${currentType}`);
  if (activeTab) activeTab.classList.add('active');
}

function openLightbox(src) {
  const lb = document.getElementById('lightbox');
  document.getElementById('lightboxImg').src = src;
  lb.classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  const lb = document.getElementById('lightbox');
  lb.classList.remove('show');
  document.body.style.overflow = '';
  document.getElementById('lightboxImg').src = '';
}

function updateActiveTag() {
  const tag = document.getElementById('activeTag');
  if (currentCat === 'all') { tag.innerHTML = ''; return; }
  tag.innerHTML = `
    <div class="active-cat-tag">
      ${catName(currentCat)}
      <span class="clear" onclick="filterByCat('all')">&times;</span>
    </div>`;
}

function getFiltered() {
  const query = document.getElementById('searchInput').value.toLowerCase().trim();
  let filtered = PROMPTS;
  if (currentCat !== 'all') {
    filtered = filtered.filter(p => p.cat === currentCat);
  }
  if (currentType !== 'all') {
    filtered = filtered.filter(p => p.type === currentType);
  }
  if (query) {
    filtered = filtered.filter(p =>
      (p.image_prompt||'').toLowerCase().includes(query) ||
      (p.image_prompt_ja||'').toLowerCase().includes(query) ||
      (p.video_prompt||'').toLowerCase().includes(query) ||
      (p.video_prompt_ja||'').toLowerCase().includes(query) ||
      (p.title||'').toLowerCase().includes(query) ||
      (p.title_ja||'').toLowerCase().includes(query)
    );
  }
  return filtered;
}

function render() {
  const t = LANG[currentLang];
  const filtered = getFiltered();
  document.getElementById('resultCount').textContent = `${filtered.length} / ${PROMPTS.length}`;
  updateTypeTabs();

  const grid = document.getElementById('cards');
  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty-state">
      <div class="icon">?</div><h3>${t.noResults}</h3><p>${t.noResultsHint}</p></div>`;
    return;
  }

  grid.innerHTML = filtered.map((p, i) => {
    const isExpanded = expandedCards.has(i);
    const ptype = p.type || 'image';
    const isJa = currentLang === 'ja';

    const ip = isJa && p.image_prompt_ja ? p.image_prompt_ja : (p.image_prompt || '');
    const vp = isJa && p.video_prompt_ja ? p.video_prompt_ja : (p.video_prompt || '');
    const hasImages = p.images && Array.isArray(p.images) && p.images.length > 0;
    const hasVideo = p.video && typeof p.video === 'string';
    const hasAnyMedia = hasImages || hasVideo;

    return `
    <div class="card type-${ptype}${isExpanded ? ' expanded' : ''}" id="card-${i}">
      <!-- Row 1: Title + POST badge + Copy -->
      <div class="card-row card-row-header">
        <span class="card-num">#${i + 1}</span>
        <span class="type-badge ${ptype}">POST</span>
        <div class="card-title">${escHtml(isJa && p.title_ja ? p.title_ja : p.title)}</div>
        ${p.link ? `<a href="${escAttr(p.link)}" target="_blank" class="card-link-inline">${t.viewOnX}</a>` : ''}
      </div>
      <!-- Row 2: GPT-Image-2 Prompt -->
      ${ip ? `
      <div class="card-row prompt-row">
        <span class="row-label">GPT-image-2</span>
        <div class="row-content">${escHtml(ip)}</div>
        <button class="copy-btn-mini" id="copyImg-${i}" onclick="copyField(${i},'image')">${t.copy}</button>
      </div>` : ''}
      <!-- Row 3: Images -->
      ${hasImages ? `
      <div class="card-row media-row">
        <div class="row-label">Images</div>
        ${renderImageGrid(p, i)}
      </div>` : ''}
      <!-- Row 4: Seedance Prompt -->
      ${vp ? `
      <div class="card-row prompt-row">
        <span class="row-label">Seedance</span>
        <div class="row-content">${escHtml(vp)}</div>
        <button class="copy-btn-mini" id="copyVid-${i}" onclick="copyField(${i},'video')">${t.copy}</button>
      </div>` : ''}
      <!-- Row 5: Video -->
      ${hasVideo ? `
      <div class="card-row media-row">
        <div class="row-label">Video</div>
        <video src="${escAttr(p.video)}" controls playsinline preload="metadata" style="width:100%;max-height:400px;border-radius:4px;background:#000;"></video>
      </div>` : ''}
      ${(ip||vp) ? `<button class="expand-hint" onclick="toggleExpand(${i})">${isExpanded ? t.collapse : t.expand}</button>` : ''}
    </div>`;
  }).join('');
}

function renderImageGrid(p, i) {
  const images = p.images;
  if (!images || images.length === 0) return '';
  let html = '<div class="media-grid">';
  images.forEach((src, idx) => {
    html += `<img src="${escAttr(src)}" alt="" loading="lazy" onclick="event.stopPropagation();openLightbox('${escAttr(src)}')" onerror="this.style.display='none'">`;
  });
  html += '</div>';
  return html;
}

function copyField(i, field) {
  const p = getFiltered()[i];
  if (!p) return;
  const isJa = currentLang === 'ja';
  let text = '';
  if (field === 'image') {
    text = isJa && p.image_prompt_ja ? p.image_prompt_ja : (p.image_prompt || '');
  } else {
    text = isJa && p.video_prompt_ja ? p.video_prompt_ja : (p.video_prompt || '');
  }
  const btnId = field === 'image' ? `copyImg-${i}` : `copyVid-${i}`;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById(btnId);
    if (!btn) return;
    btn.textContent = LANG[currentLang].copied;
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = LANG[currentLang].copy; btn.classList.remove('copied'); }, 1500);
  }).catch(() => {});
}

// ===== ACTIONS =====
function toggleExpand(i) {
  expandedCards.has(i) ? expandedCards.delete(i) : expandedCards.add(i);
  render();
}

// ===== LANG =====
function toggleLang() {
  currentLang = currentLang === 'zh' ? 'ja' : 'zh';
  document.body.className = currentLang === 'ja' ? 'lang-ja' : 'lang-zh';
  document.getElementById('searchInput').placeholder = currentLang === 'ja' ? '提示詞を検索...' : '搜索提示词...';
  document.getElementById('langSwitch').innerHTML = currentLang === 'ja'
    ? '<span class="lang-label-active">JA</span><span class="lang-divider">/</span><span>中</span>'
    : '<span>JA</span><span class="lang-divider">/</span><span class="lang-label-active">中</span>';
  // Update sidebar
  document.querySelector('.sidebar-sub').textContent = currentLang === 'ja' ? 'MrLarus AI 提示詞庫' : 'MrLarus AI 提示词库';
  document.querySelector('.sidebar-footer span').textContent = currentLang === 'ja' ? '全85件 · 更新 2026-05-03' : '共85条 · 更新 2026-05-03';
  // Update type tabs
  document.querySelector('.type-tab.all span:first-child').textContent = currentLang === 'ja' ? 'すべて' : '全部';
  document.querySelector('.type-tab.image span:first-child').textContent = currentLang === 'ja' ? '画像プロンプト' : '图片提示词';
  document.querySelector('.type-tab.video span:first-child').textContent = currentLang === 'ja' ? '動画プロンプト' : '视频提示词';
  buildNav();
  updateActiveTag();
  render();
}

// ===== MOBILE SIDEBAR =====
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

// ===== HELPERS =====
function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function escAttr(s) { return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ===== KEYBOARD =====
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('searchInput').focus();
  }
  if (e.key === 'Escape') {
    if (document.getElementById('lightbox').classList.contains('show')) {
      closeLightbox();
      return;
    }
    document.getElementById('searchInput').value = '';
    filterByCat('all');
    document.getElementById('searchInput').blur();
  }
});

// ===== START =====
init();
</script>
</body>
</html>
